name: designsphere
description: DesignSphere - Digital Agency Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Typography
  google_fonts: ^6.1.0

  # State management
  provider: ^6.1.2

  # Persist theme preference
  shared_preferences: ^2.2.3

  # HTTP calls for EmailJS
  http: ^1.2.1

  # ── Firebase ─────────────────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/